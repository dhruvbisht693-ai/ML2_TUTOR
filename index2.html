<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ML Mastery — Learn by Doing</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00e5a0;--g2:#00b37d;--g3:#007a55;
  --am:#f5a623;--am2:#e8940f;--co:#ff6b47;--pu:#a78bfa;--bl:#60a5fa;
  --bg:#080c0a;--bg2:#0d1210;--bg3:#121a17;--bg4:#1a2420;--bg5:#222e29;
  --bd:rgba(0,229,160,0.08);--bd2:rgba(0,229,160,0.18);--bd3:rgba(0,229,160,0.38);
  --tx:#e8f0ec;--tx2:#7a9990;--tx3:#3d5a50;
  --mono:'Space Mono',monospace;--syne:'Syne',sans-serif;--sans:'DM Sans',sans-serif;
  --r:14px;--rs:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--tx)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.022) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:99px}

/* LAYOUT */
.shell{display:grid;grid-template-columns:272px 1fr;grid-template-rows:52px 1fr;height:100vh;position:relative;z-index:1}

/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 1.25rem;gap:10px;z-index:10}
.tb-logo{font-family:var(--syne);font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--g),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0}
.tb-sep{width:1px;height:18px;background:var(--bd2);flex-shrink:0}
.tb-crumb{font-family:var(--mono);font-size:10px;color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-crumb span{color:var(--g)}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.xp-pill{background:rgba(0,229,160,0.1);border:1px solid var(--bd2);border-radius:20px;padding:3px 10px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--g);white-space:nowrap}
.streak-pill{font-family:var(--mono);font-size:10px;color:var(--am);white-space:nowrap}
.py-status{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid;white-space:nowrap}
.py-loading{color:var(--am);border-color:rgba(245,166,35,0.3);background:rgba(245,166,35,0.06)}
.py-ready{color:var(--g);border-color:rgba(0,229,160,0.3);background:rgba(0,229,160,0.06)}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;padding:0.75rem 0.6rem}
.ph-sep{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:10px 6px 4px;margin-top:4px;display:flex;align-items:center;gap:6px}
.ph-sep::after{content:'';flex:1;height:1px;background:var(--bd)}
.day-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:10px;cursor:pointer;transition:all 0.15s;margin-bottom:1px;border:1px solid transparent}
.day-item:hover:not(.locked){background:var(--bg3)}
.day-item.active{background:rgba(0,229,160,0.07);border-color:var(--bd2)}
.day-item.locked{opacity:0.38;cursor:not-allowed}
.di-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;flex-shrink:0;border:1px solid var(--bd);background:var(--bg3);color:var(--tx3);transition:all 0.2s}
.di-icon.done{background:rgba(0,229,160,0.12);color:var(--g);border-color:rgba(0,229,160,0.28)}
.di-icon.cur{background:rgba(245,166,35,0.12);color:var(--am);border-color:rgba(245,166,35,0.28)}
.di-text{flex:1;min-width:0}
.di-title{font-size:11px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.di-sub{font-size:10px;color:var(--tx2);margin-top:1px}
.di-pct{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--tx3);flex-shrink:0}
.di-pct.lit{color:var(--g)}

/* MAIN */
.main{overflow:hidden;display:flex;flex-direction:column}

/* LANDING */
.landing{overflow-y:auto;padding:2rem 2.5rem;max-width:820px}
.landing-hero{margin-bottom:1.5rem}
.landing-hero h1{font-family:var(--syne);font-size:26px;font-weight:800;line-height:1.2;margin-bottom:6px}
.landing-hero h1 .hl{background:linear-gradient(135deg,var(--g),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing-hero p{font-size:13px;color:var(--tx2);line-height:1.7;max-width:560px}
.feat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:1.25rem 0}
.feat-box{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;text-align:center}
.feat-box .fi{font-size:22px;display:block;margin-bottom:6px}
.feat-box strong{font-size:12px;font-weight:600;display:block}
.feat-box span{font-size:11px;color:var(--tx2);margin-top:3px;display:block;line-height:1.5}
.day-card-list{display:flex;flex-direction:column;gap:7px}
.day-launch-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all 0.18s}
.day-launch-card:hover:not(.lc-locked){border-color:var(--bd2);transform:translateX(3px)}
.day-launch-card.lc-locked{opacity:0.38;cursor:not-allowed}
.lc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg4)}
.lc-body{flex:1;min-width:0}
.lc-body strong{font-size:13px;font-weight:500;display:block;color:var(--tx)}
.lc-body span{font-size:11px;color:var(--tx2);margin-top:2px;display:block}
.lc-arr{font-size:16px;color:var(--tx3)}
.lc-bar{width:60px;height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;flex-shrink:0}
.lc-bar-fill{height:100%;border-radius:99px;background:var(--g);transition:width 0.4s}

/* LESSON VIEW */
.lesson-view{display:grid;grid-template-columns:1fr 440px;height:calc(100vh - 52px);overflow:hidden}
.l-left{overflow-y:auto;padding:1.5rem 1.75rem;border-right:1px solid var(--bd)}
.l-right{overflow-y:auto;padding:1.1rem 1.2rem}

/* Lesson header */
.lh-day{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:5px;letter-spacing:0.5px}
.lh-title{font-family:var(--syne);font-size:19px;font-weight:800;line-height:1.2;margin-bottom:8px}
.lh-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
.ltag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid}
.lt-t{background:rgba(167,139,250,0.1);color:#c4b5fd;border-color:rgba(167,139,250,0.25)}
.lt-c{background:rgba(0,229,160,0.08);color:var(--g);border-color:rgba(0,229,160,0.2)}
.lt-p{background:rgba(245,166,35,0.08);color:var(--am);border-color:rgba(245,166,35,0.2)}
.lt-pr{background:rgba(255,107,71,0.08);color:#ff9980;border-color:rgba(255,107,71,0.2)}

/* Progress bar */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:1.4rem}
.prog-bar{flex:1;background:var(--bg4);border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g2),var(--g));border-radius:99px;transition:width 0.5s cubic-bezier(.34,1.56,.64,1)}
.prog-txt{font-family:var(--mono);font-size:10px;color:var(--tx2);white-space:nowrap;flex-shrink:0}

/* Concept blocks */
.cb{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:1.15rem;margin-bottom:1rem}
.cb-h{font-family:var(--syne);font-size:13px;font-weight:700;color:var(--g);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.cb-h::before{content:'';width:3px;height:14px;background:var(--g);border-radius:99px;flex-shrink:0}
.cb-t{font-size:13px;color:var(--tx2);line-height:1.8}
.cb-t strong{color:var(--tx);font-weight:500}
.cb-t br+br{display:block;margin:4px 0}
.math{background:#08100d;border:1px solid var(--bd2);border-radius:8px;padding:10px 14px;margin:10px 0;font-family:var(--mono);font-size:13px;color:#7fffd4;text-align:center;letter-spacing:0.5px}
.ibox{background:linear-gradient(135deg,rgba(96,165,250,0.05),rgba(167,139,250,0.03));border:1px solid rgba(96,165,250,0.18);border-radius:var(--r);padding:1rem;margin-bottom:1rem}
.ibox-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--bl);text-transform:uppercase;margin-bottom:6px}
.ibox-t{font-size:13px;color:var(--tx2);line-height:1.7}
.ibox-t strong{color:var(--tx)}
.wbox{background:rgba(245,166,35,0.05);border:1px solid rgba(245,166,35,0.2);border-left:3px solid var(--am);border-radius:0 var(--rs) var(--rs) 0;padding:0.85rem 1rem;margin-bottom:1rem;font-size:12px;color:#fcd34d;line-height:1.7}
.wbox::before{content:'⚠ ';font-weight:700}
.csnip{background:#08100d;border:1px solid var(--bd2);border-radius:var(--r);padding:1rem;margin-bottom:1rem;overflow-x:auto}
.csnip pre{font-family:var(--mono);font-size:11px;line-height:1.9;color:#a8d8b9}
.kw{color:#ff9980}.fn{color:var(--g)}.cm{color:var(--tx3)}.st{color:#fcd34d}.nm{color:var(--bl)}
.ic{font-family:var(--mono);font-size:11px;background:var(--bg4);color:var(--g);padding:2px 5px;border-radius:4px}

/* Task tabs */
.task-tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.ttab{padding:5px 12px;border-radius:var(--rs);font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);transition:all 0.15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.ttab:hover{border-color:var(--bd2)}
.ttab.act{background:rgba(0,229,160,0.08);border-color:var(--bd2);color:var(--tx)}
.ttab.done{background:rgba(0,229,160,0.07);border-color:rgba(0,229,160,0.2);color:var(--g)}
.ttab .ck{width:13px;height:13px;border-radius:4px;background:var(--g);display:none;align-items:center;justify-content:center;flex-shrink:0}
.ttab.done .ck{display:flex}
.ttab .ck::after{content:'';width:3px;height:5px;border-right:1.5px solid #000;border-bottom:1.5px solid #000;transform:rotate(45deg) translate(-0.5px,-0.5px);display:block}

/* Q panel */
.qpanel{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:1rem;overflow:hidden}
.qp-head{padding:1rem 1rem 0.75rem}
.qp-num{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.qp-q{font-size:13px;font-weight:500;line-height:1.6;color:var(--tx);white-space:pre-line}
.qp-diff{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:7px}
.diff-e{background:rgba(0,229,160,0.1);color:var(--g)}
.diff-m{background:rgba(245,166,35,0.1);color:var(--am)}
.diff-h{background:rgba(255,107,71,0.1);color:var(--co)}

/* MCQ */
.mcq-list{padding:0.75rem 1rem;display:flex;flex-direction:column;gap:6px}
.mcq-opt{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:9px;border:1px solid var(--bd2);cursor:pointer;transition:all 0.15s;font-size:12px;line-height:1.5;color:var(--tx)}
.mcq-opt:hover{background:var(--bg4);border-color:var(--bd3)}
.mcq-opt.sel{border-color:var(--bl);background:rgba(96,165,250,0.06)}
.mcq-opt.ok{border-color:var(--g);background:rgba(0,229,160,0.07);color:var(--g);animation:optOk 0.3s ease}
.mcq-opt.ng{border-color:var(--co);background:rgba(255,107,71,0.07);color:#ff9980}
@keyframes optOk{0%{transform:scale(0.98)}100%{transform:scale(1)}}
.opt-l{font-family:var(--mono);font-size:10px;font-weight:700;width:20px;height:20px;border-radius:5px;background:var(--bg4);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* Feedback */
.fb{margin:0 1rem 0.75rem;border-radius:9px;padding:9px 12px;font-size:12px;line-height:1.6;display:none;animation:fadeIn 0.25s ease}
.fb.show{display:block}
.fb-ok{background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.18);color:var(--g)}
.fb-ng{background:rgba(255,107,71,0.06);border:1px solid rgba(255,107,71,0.18);color:#ff9980}
.fb-h{font-weight:600;font-size:11px;font-family:var(--mono);margin-bottom:3px;display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Code editor */
.editor-wrap{border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden;margin-bottom:0.75rem;transition:border-color 0.2s}
.editor-wrap.pass-flash{border-color:var(--g);box-shadow:0 0 0 2px rgba(0,229,160,0.18)}
.editor-wrap.fail-flash{border-color:var(--co);animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.ed-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg4);border-bottom:1px solid var(--bd)}
.ed-lang{font-family:var(--mono);font-size:9px;color:var(--tx2)}
.ed-btns{display:flex;gap:6px}
.ed-btn{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bd2);background:transparent;color:var(--tx2);transition:all 0.15s}
.ed-btn:hover{background:var(--bg3);color:var(--tx)}
.run-btn{background:linear-gradient(135deg,var(--g2),var(--g));color:#000;border:none;font-weight:700;padding:4px 14px;border-radius:6px;cursor:pointer;font-family:var(--syne);font-size:10px;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.run-btn:hover{box-shadow:0 0 14px rgba(0,229,160,0.35)}
.run-btn:disabled{opacity:0.5;cursor:not-allowed}
.run-btn .spin{display:none;width:10px;height:10px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite}
.run-btn.loading .spin{display:block}
.run-btn.loading .run-txt{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.CodeMirror{height:auto;min-height:120px;max-height:300px;font-family:var(--mono)!important;font-size:12px!important;line-height:1.7!important;background:#0d1410!important}
.CodeMirror-scroll{max-height:300px}
.out-panel{background:#060a08;border-top:1px solid var(--bd);padding:8px 12px;font-family:var(--mono);font-size:11px;min-height:40px;max-height:140px;overflow-y:auto;display:none;white-space:pre-wrap;line-height:1.7}
.out-panel.show{display:block}
.out-pass{color:var(--g)}.out-fail{color:#ff9980}.out-stdout{color:var(--tx2)}.out-err{color:var(--co)}

/* Hints */
.hints-wrap{padding:0 1rem 0.75rem}
.hint-btn{width:100%;background:rgba(245,166,35,0.05);border:1px dashed rgba(245,166,35,0.25);border-radius:8px;padding:7px 11px;font-size:11px;color:var(--am);cursor:pointer;font-family:var(--sans);text-align:left;display:flex;align-items:center;gap:7px;margin-bottom:4px;transition:all 0.2s}
.hint-btn:hover{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.4)}
.hint-box{background:rgba(245,166,35,0.04);border:1px solid rgba(245,166,35,0.14);border-radius:8px;padding:9px 11px;font-size:12px;color:#fcd34d;line-height:1.7;margin-bottom:4px;display:none;animation:fadeIn 0.25s ease}
.hint-box.show{display:block}
.sol-btn{width:100%;background:rgba(255,107,71,0.05);border:1px dashed rgba(255,107,71,0.2);border-radius:8px;padding:7px 11px;font-size:11px;color:var(--co);cursor:pointer;font-family:var(--sans);text-align:left;display:flex;align-items:center;gap:7px;transition:all 0.2s;margin-top:2px}
.sol-btn:hover{background:rgba(255,107,71,0.09)}
.sol-area{display:none;background:#08100d;border:1px solid rgba(255,107,71,0.18);border-radius:8px;margin-top:5px;overflow:hidden}
.sol-area.show{display:block}
.sol-area pre{font-family:var(--mono);font-size:11px;line-height:1.8;color:#a8d8b9;padding:1rem;overflow-x:auto;white-space:pre}

/* Q actions */
.qactions{padding:0 1rem 1rem;display:flex;gap:7px}
.qa-btn{padding:8px 16px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--syne);transition:all 0.2s;flex:1}
.qa-btn:active{transform:scale(0.97)}
.qa-submit{background:linear-gradient(135deg,var(--g2),var(--g));color:#000}
.qa-submit:hover{box-shadow:0 0 16px rgba(0,229,160,0.35)}

/* Complete screen */
.done-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2.5rem 2rem;min-height:400px}
.ds-icon{font-size:52px;margin-bottom:1rem;display:block;animation:bounceIn 0.6s cubic-bezier(.34,1.56,.64,1)}
@keyframes bounceIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.ds-title{font-family:var(--syne);font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--g),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.ds-sub{font-size:13px;color:var(--tx2);margin-bottom:1.25rem;line-height:1.6;max-width:320px}
.ds-xp{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--g);display:block;margin-bottom:1.5rem;text-shadow:0 0 20px rgba(0,229,160,0.35)}
.ds-btn{background:linear-gradient(135deg,var(--g2),var(--g));color:#000;border:none;border-radius:var(--rs);padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--syne);transition:all 0.2s;margin:3px}
.ds-btn:hover{box-shadow:0 0 22px rgba(0,229,160,0.4);transform:scale(1.03)}
.ds-btn-g{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd2)}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--bd3);border-radius:var(--r);padding:10px 16px;z-index:9999;transform:translateY(70px);opacity:0;transition:all 0.35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;min-width:130px}
.toast.show{transform:translateY(0);opacity:1}
.t-xp{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--g);display:block;line-height:1}
.t-lbl{font-size:10px;color:var(--tx2);margin-top:2px;display:block}

/* Pyodide loader overlay */
.py-overlay{position:fixed;inset:0;background:rgba(8,12,10,0.92);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(4px)}
.py-overlay.hidden{display:none}
.py-spinner{width:36px;height:36px;border:3px solid var(--bd2);border-top-color:var(--g);border-radius:50%;animation:spin 0.7s linear infinite}
.py-ov-title{font-family:var(--syne);font-size:16px;font-weight:800;color:var(--tx)}
.py-ov-sub{font-family:var(--mono);font-size:11px;color:var(--tx2)}
.py-steps{display:flex;flex-direction:column;gap:6px;margin-top:8px}

 {phase:"Phase 1 — Regression",col:"#00e5a0",days:[
  {day:1,title:"Linear Regression — Intuition & Cost",topic:"Supervised Learning",xp:175,
   concept:`<div class="cb"><div class="cb-h">What is Linear Regression?</div><div class="cb-t">Linear Regression finds the <strong>best-fit line</strong> through data. Given input x, we predict:<br><br></div><div class="math">ŷ = w·x + b</div><div class="cb-t"><strong>w</strong> = weight (slope), <strong>b</strong> = bias (intercept). Goal: find w and b so ŷ ≈ y.</div></div><div class="ibox"><div class="ibox-lbl">💡 Real-world intuition</div><div class="ibox-t">Predicting house price from size. Bigger house → higher price. The <strong>weight</strong> says "for every extra sq ft, price goes up by $X". The <strong>bias</strong> is the base price even at 0 sq ft.</div></div><div class="cb"><div class="cb-h">The Cost Function J(w,b)</div><div class="cb-t">How do we measure how wrong our line is? Use <strong>Mean Squared Error (MSE)</strong>:</div><div class="math">J(w,b) = (1/2m) · Σ(ŷᵢ − yᵢ)²</div><div class="cb-t">m = number of examples. The <strong>½</strong> is a convenience that cancels when we differentiate. <strong>We want to minimize J.</strong> When J=0, every prediction is perfect.</div></div><div class="wbox">Squaring errors matters: without it, positive and negative errors cancel out and you'd think a terrible model is perfect.</div>`,

  {day:2,title:"Gradient Descent",topic:"Optimization",xp:200,
   concept:`<div class="cb"><div class="cb-h">Why Gradient Descent?</div><div class="cb-t">We want to minimize J(w,b). Imagine standing on a hilly terrain blindfolded — you find the valley by always stepping <strong>downhill</strong>. The gradient tells us the slope; we step opposite to it.</div></div><div class="cb"><div class="cb-h">The Update Rules</div><div class="math">w := w − α · (∂J/∂w)</div><div class="math">b := b − α · (∂J/∂b)</div><div class="cb-t">Where <strong>α</strong> (alpha) is the learning rate — step size. The partial derivatives are:</div><div class="math">∂J/∂w = (1/m)·Σ(ŷᵢ−yᵢ)·xᵢ&nbsp;&nbsp;&nbsp;&nbsp;∂J/∂b = (1/m)·Σ(ŷᵢ−yᵢ)</div></div><div class="ibox"><div class="ibox-lbl">⚡ Learning rate intuition</div><div class="ibox-t"><strong>Too small α</strong> → tiny steps, takes forever to converge.<br><strong>Too large α</strong> → overshoots the valley, cost oscillates or explodes.<br>Typical starting value: 0.01. Always update w and b <strong>simultaneously</strong> — compute both gradients with OLD w,b before updating either.</div></div><div class="wbox">Never update w first and then use the NEW w to compute b's gradient. This changes the math and causes bugs.</div>`,
   tasks:[
    {id:"2_1",title:"Q1: Apply the update rule",type:"mcq",diff:"easy",xp:25,
     q:"Current w=5.0. Gradient ∂J/∂w=2.0, learning rate α=0.1.\nWhat is the new w after one update step?",
     opts:["5.2","4.8","5.0","4.0"],ans:1,
     exp:"w = w − α·(∂J/∂w) = 5.0 − 0.1·2.0 = 5.0 − 0.2 = 4.8. We SUBTRACT gradient×α. Positive gradient means we're on an upward slope → move left (decrease w).",
     hint:"Apply: w_new = w - alpha * gradient = 5.0 - 0.1 * 2.0"},

    {id:"2_3",title:"Q3: Implement compute_gradients()",type:"code",diff:"medium",xp:55,

     starter:`import numpy as np

def compute_gradients(X, y, w, b):
    m = len(X)
    # Step 1: predictions = w*X + b
    # Step 2: errors = predictions - y
    # Step 3: dw = (1/m) * np.dot(errors, X)

X = np.array([1.,2.,3.]); y = np.array([1.,2.,3.])
dw, db = compute_gradients(X, y, 1.0, 0.0)

     hints:["predictions = w * X + b, then errors = predictions - y","np.dot(errors, X) computes Σ(errors[i]*X[i]) — the dot product handles the sum","dw = (1/m)*np.dot(errors, X)  and  db = (1/m)*np.sum(errors)"],

     test:`import numpy as np

result = "PASS"`,
     hints:["Inside loop: predictions = w*X+b, errors = predictions-y","Gradients: dw=(1/m)*np.dot(errors,X), db=(1/m)*np.sum(errors)","Update simultaneously: w = w - alpha*dw  then  b = b - alpha*db  (not before computing both grads)"],
     sol:`import numpy as np

def gradient_descent(X, y, w, b, alpha, n_iters):
    m = len(X)

    for i in range(n_iters):

  {day:3,title:"Vectorization & Feature Scaling",topic:"NumPy Mastery",xp:155,
   concept:`<div class="cb"><div class="cb-h">Why Vectorization?</div><div class="cb-t">Python loops are <strong>100–1000x slower</strong> than NumPy operations. NumPy runs in C under the hood. For 1M rows: loop = 10 seconds, vectorized = 0.01 seconds.<br><br>With multiple features, X becomes a matrix (m×n) and predictions become:</div><div class="math">ŷ = X @ w + b</div><div class="cb-t">Where @ is matrix multiplication and w is now a vector of weights.</div></div><div class="cb"><div class="cb-h">Z-score Feature Normalization</div><div class="cb-t">If feature 1 ranges 0–1000 and feature 2 ranges 0–0.001, gradient descent is imbalanced. Normalize each feature:</div><div class="math">x_norm = (x − μ) / σ</div><div class="cb-t">μ = mean, σ = standard deviation. After normalization: <strong>mean≈0, std≈1</strong> for every feature.</div></div><div class="ibox"><div class="ibox-lbl">🔑 Critical rule</div><div class="ibox-t">Compute μ and σ <strong>ONLY on training data</strong>. Then apply the same μ,σ to normalize test data. Never fit the normalizer on test data — that's data leakage.</div></div>`,

    {id:"3_3",title:"Q3: Implement normalize()",type:"code",diff:"medium",xp:55,
     q:"Implement normalize(X) for a 2D NumPy array (m×n).\nNormalize each COLUMN independently.\nReturn: (X_norm, mu, sigma)  ← you need mu/sigma to normalize test data later!",
     starter:`import numpy as np

def normalize(X):
    # mu: mean of each column → shape (n,)

              [2., 200.],

     test:`import numpy as np
np.random.seed(0)
X = np.random.randn(100, 3) * np.array([10., 100., 0.1])
X_norm, mu, sigma = normalize(X)
assert X_norm.shape == X.shape, f"Shape must be preserved: {X_norm.shape}"
assert np.allclose(X_norm.mean(axis=0), 0, atol=1e-9), f"Mean should be 0, got {X_norm.mean(axis=0)}"
assert np.allclose(X_norm.std(axis=0), 1, atol=1e-9), f"Std should be 1, got {X_norm.std(axis=0)}"
result = "PASS"`,
     hints:["Use np.mean(X, axis=0) to get the mean of each column (axis=0 means 'along rows')","Use np.std(X, axis=0) for standard deviation per column","Broadcasting: (X - mu) / sigma works directly — NumPy handles each column automatically"],

     sol:`import numpy as np

   ]},

  {day:4,title:"Logistic Regression — Sigmoid & Loss",topic:"Classification",xp:175,
   concept:`<div class="cb"><div class="cb-h">The Problem with Linear for Classification</div><div class="cb-t">Linear regression outputs any real number — but we need <strong>probabilities (0 to 1)</strong> for classification. A line can give you -5 or 100, which are meaningless as probabilities.<br><br>Solution: wrap the linear output in the <strong>sigmoid function</strong>:</div><div class="math">σ(z) = 1 / (1 + e⁻ᶻ)</div><div class="cb-t">Squishes any real number z into (0,1). Interpret output as <strong>probability of class 1</strong>.</div></div><div class="cb"><div class="cb-h">Binary Cross-Entropy Loss</div><div class="cb-t">MSE works poorly for classification (non-convex). Use <strong>log loss</strong>:</div><div class="math">L = −(1/m)·Σ[ yᵢ·log(ŷᵢ) + (1−yᵢ)·log(1−ŷᵢ) ]</div><div class="cb-t">When y=1: loss = −log(ŷ). Predict ŷ≈1 → loss≈0 ✓. Predict ŷ≈0 → loss→∞ ✗.<br>When y=0: loss = −log(1−ŷ). Same logic reversed.</div></div><div class="ibox"><div class="ibox-lbl">🎯 Decision boundary</div><div class="ibox-t">Predict class 1 if ŷ ≥ 0.5, else class 0. Since σ(0)=0.5, boundary is where <strong>w·x+b=0</strong>. This is a line/plane in feature space.</div></div>`,

     hints:["Forward: z = X @ w + b, then y_hat = sigmoid(z)","Gradients: dw = (1/m)*X.T @ (y_hat - y)  and  db = (1/m)*np.sum(y_hat - y)","X.T is X transposed. X.T @ errors vectorizes the sum over all examples."],
     sol:`import numpy as np

def sigmoid(z): return 1/(1+np.exp(-z))

def train_logistic(X, y, alpha=0.1, epochs=1000):
    m, n = X.shape
    w = np.zeros(n)
    b = 0.0
    for epoch in range(epochs):
        z = X @ w + b
        y_hat = sigmoid(z)
        errors = y_hat - y
        dw = (1/m) * X.T @ errors
        db = (1/m) * np.sum(errors)
        w -= alpha * dw
        b -= alpha * db
    return w, b`},

     hints:["TP = sum((y_pred==1) & (y_true==1)), FP = sum((y_pred==1) & (y_true==0))","Precision = TP/(TP+FP), Recall = TP/(TP+FN), Accuracy = (TP+TN)/total","F1 = 2*P*R/(P+R) — harmonic mean of precision and recall"],
     sol:`import numpy as np

def compute_metrics(y_true, y_pred):
    TP = np.sum((y_pred==1)&(y_true==1))
    FP = np.sum((y_pred==1)&(y_true==0))
    FN = np.sum((y_pred==0)&(y_true==1))
    TN = np.sum((y_pred==0)&(y_true==0))
    acc = (TP+TN)/len(y_true)
    prec = TP/(TP+FP) if TP+FP>0 else 0
    rec  = TP/(TP+FN) if TP+FN>0 else 0
    f1   = 2*prec*rec/(prec+rec) if prec+rec>0 else 0
    return {'accuracy':acc,'precision':prec,'recall':rec,'f1':f1}`}

  {day:6,title:"Regularization — L1 & L2",topic:"Overfitting",xp:165,
   concept:`<div class="cb"><div class="cb-h">The Overfitting Problem</div><div class="cb-t">A model that memorizes training data performs poorly on new data. Signs: training loss ↓ but validation loss ↑.<br><br><strong>Regularization</strong> adds a penalty for large weights, discouraging the model from fitting noise.</div></div><div class="cb"><div class="cb-h">L2 Regularization (Ridge)</div><div class="math">J = MSE + (λ/2m)·Σwᵢ²</div><div class="cb-t">Penalizes large weights. Keeps them <strong>small but nonzero</strong>. Gradient update: dw += (λ/m)·w. λ controls strength. Never regularize the bias b!</div></div><div class="cb"><div class="cb-h">L1 Regularization (Lasso)</div><div class="math">J = MSE + (λ/m)·Σ|wᵢ|</div><div class="cb-t">Penalizes absolute values. Can drive weights to <strong>exactly zero</strong> — automatic feature selection. Use when most features are likely irrelevant.</div></div><div class="ibox"><div class="ibox-lbl">📌 When to use which</div><div class="ibox-t"><strong>L2 (Ridge)</strong>: most of the time. Smooth, stable, works well with correlated features.<br><strong>L1 (Lasso)</strong>: when you have many features and expect sparsity (most weights = 0).</div></div>`,

def build_tree(X, y, depth=0, max_depth=3):
    classes, counts = np.unique(y, return_counts=True)

    if depth>=max_depth or len(classes)==1:
        return {'leaf':True,'class':majority}
    f,t=best_split(X,y); mask=X[:,f]<=t

const SK='mlm_v6';
let ST={done:[],xp:0};
let curDay=null, curTaskIdx=0, editors={};
let pyodide=null, pyReady=false;

function loadState(){try{const r=localStorage.getItem(SK);if(r){const p=JSON.parse(r);ST.done=p.done||[];ST.xp=p.xp||0;}}catch(e){}}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}}
function isDone(id){return ST.done.includes(id);}
function markDone(id,xp){if(!isDone(id)){ST.done.push(id);ST.xp+=xp;saveState();}}
function allDays(){return C.flatMap(p=>p.days);}
function dayProg(day){const d=day.tasks.filter(t=>isDone(t.id)).length;return{done:d,total:day.tasks.length,pct:Math.round(d/day.tasks.length*100)};}
function isUnlocked(dayNum){if(dayNum===1)return true;const prev=allDays().find(d=>d.day===dayNum-1);return prev?dayProg(prev).pct===100:true;}
function getLvl(xp){const t=[500,1200,2200,3500,5000];const n=['Beginner','Apprentice','Practitioner','Engineer','Expert','Master'];let l=0;for(let i=0;i<t.length;i++){if(xp>=t[i])l=i+1;}return{lvl:l+1,name:n[l]};}
function getStreak(){let s=0;for(const d of allDays()){if(dayProg(d).pct===100)s++;else break;}return s;}

async function initPyodide(){
  try{
    setStep(1,'cur');
    pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/'});
    setStep(1,'done'); setStep(2,'cur');
    await pyodide.loadPackage('numpy');
    setStep(2,'done'); setStep(3,'cur');
    await pyodide.loadPackage('scikit-learn');
    setStep(3,'done'); setStep(4,'cur');
    // setup stdout capture
    await pyodide.runPythonAsync(`import sys,io\nsys.stdout=io.StringIO()\nsys.stderr=io.StringIO()`);
    setStep(4,'done');
    pyReady=true;
    document.getElementById('pyOverlay').classList.add('hidden');
    document.getElementById('pyStatus').className='py-status py-ready';
    document.getElementById('pyStatus').textContent='✓ Python ready';
  }catch(e){
    document.getElementById('pyOverlay').innerHTML=`<div style="color:#ff9980;font-family:var(--mono);text-align:center"><div style="font-size:32px;margin-bottom:1rem">⚠</div><div>Failed to load Python runtime</div><div style="font-size:11px;margin-top:6px;color:var(--tx2)">${e.message}</div><div style="margin-top:1rem;font-size:11px;color:var(--tx2)">Check your internet connection and reload</div></div>`;
  }
}
function setStep(n,state){const el=document.getElementById('ps'+n);if(el)el.className='py-step '+state;}

async function runCode(studentCode, testCode){
  if(!pyReady)return{ok:false,stdout:'',error:'Python runtime not ready yet. Please wait.'};
  try{
    // Reset stdout
    await pyodide.runPythonAsync(`import sys,io\nsys.stdout=io.StringIO()\nsys.stderr=io.StringIO()`);
    // Run student code + test code
    const fullCode = studentCode + '\n' + testCode;
    await pyodide.runPythonAsync(fullCode);
    const stdout = pyodide.runPython("sys.stdout.getvalue()");
    const resultVar = pyodide.runPython("result if 'result' in dir() else 'NO_RESULT'");
    return{ok:resultVar==='PASS',stdout,error:null};
  }catch(e){
    let stdout='';
    try{stdout=pyodide.runPython("sys.stdout.getvalue()");}catch(_){}
    let msg=e.message||String(e);
    // Clean up Pyodide error messages
    if(msg.includes('AssertionError:')){const m=msg.match(/AssertionError: (.+)/);msg='AssertionError: '+(m?m[1]:'assertion failed');}
    else if(msg.includes('NameError:')){const m=msg.match(/NameError: (.+)/);msg='NameError: '+(m?m[1]:'name not defined');}
    else if(msg.includes('SyntaxError:')){msg='SyntaxError: check your code for typos';}
    else{msg=msg.split('\n').filter(l=>!l.includes('File "<')).slice(-3).join('\n');}
    return{ok:false,stdout,error:msg};
  }
}

function confetti(big=false){
  const cv=document.getElementById('cfc');const cx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#00e5a0','#60a5fa','#f5a623','#a78bfa','#ff6b47','#7fffd4','#f472b6'];
  const n=big?180:55;
  const ps=Array.from({length:n},()=>({x:Math.random()*cv.width,y:-20,vx:(Math.random()-.5)*7,vy:Math.random()*4+2,r:Math.random()*6+2,col:cols[~~(Math.random()*cols.length)],rot:Math.random()*360,vr:(Math.random()-.5)*9,a:1}));
  let f=0;
  (function draw(){cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.rot+=p.vr;p.a-=.007;if(p.a<=0)return;cx.save();cx.globalAlpha=p.a;cx.fillStyle=p.col;cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.5);cx.restore();});if(++f<220)requestAnimationFrame(draw);else cx.clearRect(0,0,cv.width,cv.height);})();
}

function openDay(dayNum){
  const day=allDays().find(d=>d.day===dayNum);
  if(!day||!isUnlocked(dayNum))return;
  curDay=day; curTaskIdx=0; editors={};
  // find first undone task
  const fi=day.tasks.findIndex(t=>!isDone(t.id));
  if(fi>=0)curTaskIdx=fi;
  buildSidebar();
  renderLesson();
  updateTopbar('Day '+dayNum+' — '+day.title);
}

function resetCode(taskId){

  const fb=document.getElementById('fb');if(fb){fb.className='fb';}
  const ew=document.getElementById('edWrap');if(ew){ew.className='editor-wrap';}
}

async function runTask(taskId,xp){
  const task=curDay?.tasks.find(t=>t.id===taskId);if(!task)return;
  const cm=editors[taskId];
  const code=cm?cm.getValue():(document.getElementById('codeArea')?.value||'');
  const btn=document.getElementById('runBtn');
  const out=document.getElementById('outPanel');
  const fb=document.getElementById('fb');
  const ew=document.getElementById('edWrap');
  if(btn){btn.classList.add('loading');btn.disabled=true;}
  if(out){out.className='out-panel show';out.innerHTML='<span style="color:var(--am)">⏳ Running Python...</span>';}
  const res=await runCode(code,task.test);
  if(btn){btn.classList.remove('loading');btn.disabled=false;}
  if(res.ok){
    if(out){out.className='out-panel show';out.innerHTML=(res.stdout?`<span class="out-stdout">${esc2(res.stdout)}\n</span>`:'')+'<span class="out-pass">✓ All tests passed!</span>';}
    if(fb){fb.className='fb show fb-ok';fb.innerHTML='<span class="fb-h">✓ Correct!</span>Great work! Your code passed all test cases.';}
    if(ew)ew.className='editor-wrap pass-flash';
    if(!isDone(taskId)){markDone(taskId,xp);showToast(xp,'tests passed!');confetti(true);updateTopbar('Day '+curDay.day+' — '+curDay.title);buildSidebar();}
    setTimeout(()=>{if(ew)ew.className='editor-wrap';advance();},2200);
  } else {
    const errMsg=res.error||'Unknown error';
    const stdoutPart=res.stdout?`<span class="out-stdout">${esc2(res.stdout)}\n</span>`:'';
    if(out){out.className='out-panel show';out.innerHTML=stdoutPart+`<span class="out-fail">✗ ${esc2(errMsg)}</span>`;}
    if(fb){fb.className='fb show fb-ng';fb.innerHTML=`<span class="fb-h">✗ Not passing yet</span>${esc2(errMsg)}`;}
    if(ew){ew.className='editor-wrap fail-flash';setTimeout(()=>{if(ew)ew.className='editor-wrap';},400);}
  }
}
function esc2(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function advance(){
  const day=curDay; if(!day)return;
  const prog=dayProg(day);
  if(prog.pct===100){showDayDone();return;}
  const next=day.tasks.findIndex((t,i)=>i>curTaskIdx&&!isDone(t.id));
  if(next>=0){curTaskIdx=next;}
  else{const any=day.tasks.findIndex(t=>!isDone(t.id));if(any>=0)curTaskIdx=any;}
  renderLesson();
  document.getElementById('rightPanel')?.scrollTo(0,0);
}

const msgs=[
  {icon:'🧠',title:'Day Crushed!',msg:'Every task done. Your ML fundamentals are getting solid.'},
  {icon:'⚡',title:'On Fire!',msg:'Consistency like this is what separates pros from dreamers.'},
  {icon:'🚀',title:'Momentum!',msg:'You\'re building real engineering intuition now. Keep going.'},
  {icon:'🔥',title:'Streak!',msg:'Day complete. The compound effect of daily practice adds up fast.'},
  {icon:'💡',title:'Breakthrough!',msg:'This is exactly how ML engineers are made — one day at a time.'},
];
function showDayDone(){
  const day=curDay;const totalXP=day.tasks.reduce((a,t)=>a+t.xp,0);
  const m=msgs[Math.floor(Math.random()*msgs.length)];
  const nextDay=allDays().find(d=>d.day===day.day+1);
  confetti(true);buildSidebar();
  updateTopbar('Day '+day.day+' Complete! 🎓');
  document.getElementById('main').innerHTML=`
  <div class="lesson-view">
    <div class="l-left">${day.concept}</div>
    <div class="l-right">
      <div class="done-screen">
        <span class="ds-icon">${m.icon}</span>
        <div class="ds-title">${m.title}</div>
        <div class="ds-sub">${m.msg}<br><br>Day ${day.day}: <strong>${day.title}</strong> — complete!</div>
        <span class="ds-xp">+${totalXP} XP</span>
        ${nextDay?`<button class="ds-btn" onclick="openDay(${nextDay.day})">Next: Day ${nextDay.day} →</button>`:'<button class="ds-btn" onclick="showLanding()">🏆 Course Complete!</button>'}
        <button class="ds-btn ds-btn-g" onclick="openDay(${day.day})">Review Day ${day.day}</button>
        <button class="ds-btn ds-btn-g" onclick="showLanding()">All Days</button>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════
loadState();
buildSidebar();
showLanding();
initPyodide();
window.addEventListener('resize',()=>{const c=document.getElementById('cfc');if(c){c.width=innerWidth;c.height=innerHeight;}});
</script>
